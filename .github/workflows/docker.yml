name: docker

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'site/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker.yml'

permissions:
  contents: read

jobs:
  build-and-smoke:
    name: Build image and smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: meadow:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: docker run -d --rm --name smoke -p 8080:8080 meadow:smoke

      - name: Wait for readiness and probe scenarios
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health >/dev/null; then
              echo "meadow is up after ${i}s"
              break
            fi
            sleep 1
          done
          set -e
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/ok)" = 200
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/status/503)" = 503
          codes="$(for _ in 1 2 3; do curl -s -o /dev/null -w '%{http_code} ' 'http://localhost:8080/flaky?fail=2&key=ci'; done)"
          echo "flaky codes: $codes"
          test "$codes" = "503 503 200 "

      - name: Capture logs on failure
        if: failure()
        run: docker logs smoke || true

      - name: Stop container
        if: always()
        run: docker rm -f smoke || true
